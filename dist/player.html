<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青云播 - 视频播放器</title>
    
    <link rel="icon" type="image/svg+xml" href="./assets/favicon-D4u_O9Q9.svg">
    <link rel="icon" type="image/svg+xml" sizes="16x16" href="./assets/favicon-16-B0_UbhCD.svg">
    <link rel="shortcut icon" href="./assets/favicon-D4u_O9Q9.svg">
    <link rel="apple-touch-icon" href="./assets/favicon-D4u_O9Q9.svg">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <!-- ArtPlayer 视频播放器 -->
    <script src="https://cdn.jsdelivr.net/npm/artplayer@5/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
    
    <script>
        window.addEventListener('load', function() {
            if (typeof Artplayer === 'undefined') {
                console.warn('主CDN加载失败，尝试备用CDN...');
                var s1 = document.createElement('script');
                s1.src = 'https://unpkg.com/artplayer@5/dist/artplayer.js';
                s1.onload = function() {
                    var s2 = document.createElement('script');
                    s2.src = 'https://unpkg.com/hls.js@1/dist/hls.min.js';
                    document.head.appendChild(s2);
                };
                document.head.appendChild(s1);
            }
        });
    </script>
  <script type="module" crossorigin src="./assets/player-LoXPQ9T9.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/github-manager-MX7lj4t7.js">
  <link rel="stylesheet" crossorigin href="./assets/github-manager-DFpLjy61.css">
  <link rel="stylesheet" crossorigin href="./assets/player-C1EI0Vn1.css">
</head>
<body class="player-page">
    <div class="player-container">
        <header class="player-header">
            <div class="header-left">
                <button id="backBtn" class="header-btn" title="返回列表" aria-label="返回列表">
                    <i class="material-icons">arrow_back</i>
                </button>
                <div class="video-info">
                    <h1 id="currentVideoTitle" class="video-title">加载中...</h1>
                    <div class="video-meta">
                        <span id="currentVideoMeta" class="video-type">unknown</span>
                    </div>
                </div>
            </div>
            
            <div class="header-right">
                <button id="playlistBtn" class="header-btn" title="播放列表" aria-label="播放列表">
                    <i class="material-icons">queue_music</i>
                </button>
                <button id="playerSettingsBtn" class="header-btn" title="设置" aria-label="设置">
                    <i class="material-icons">settings</i>
                </button>
            </div>
        </header>

        <main class="player-main">
            <div id="videoPlayer" class="player-video" role="region" aria-label="视频播放器">
                <div id="playerLoading" class="loading-indicator" style="display:flex">
                    <div class="loading-spinner"></div>
                    <p>正在初始化播放器...</p>
                </div>
            </div>
        </main>

        <aside id="playlistSidebar" class="playlist-sidebar">
            <div class="sidebar-header">
                <h3>播放列表</h3>
                <button id="closeSidebar" class="sidebar-close">
                    <i class="material-icons">close</i>
                </button>
            </div>
            <div class="sidebar-content">
                <div id="playlistItems" class="sidebar-video-list"></div>
            </div>
        </aside>
    </div>

    <div id="playerError" class="error-message" style="display:none">
        <div class="error-content">
            <i class="material-icons">error</i>
            <h3>播放出错</h3>
            <p id="playerErrorMessage">无法播放视频</p>
            <div class="error-actions">
                <button id="playerRetryBtn" class="btn btn-primary">重试</button>
                <button id="backToListBtn" class="btn btn-secondary">返回列表</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Vite 入口 -->
</body>
</html>
