<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放页面</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="player.css">
    <!-- 新增 ArtPlayer 样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/artplayer@latest/dist/artplayer.css">
</head>
<body class="player-page">
    <div class="player-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="material-icons">playlist_play</i> 播放列表</h2>
                <button id="toggleSidebar" class="toggle-sidebar">
                    <i class="material-icons">chevron_left</i>
                </button>
            </div>
            <div class="playlist-container">
                <div class="playlist-header">
                    <span class="video-count">0 个视频</span>
                    <button class="clear-playlist" onclick="videoPlayer.clearPlaylist()">
                        <i class="material-icons">delete_sweep</i>
                    </button>
                </div>
                <div id="playerPlaylist" class="playlist-items"></div>
            </div>
        </aside>

        <!-- 主要内容区 -->
        <main class="main-content">
            <!-- 显示侧边栏的按钮 -->
            <button id="showSidebar" class="show-sidebar-button">
                <i class="material-icons">menu</i>
            </button>

            <!-- 视频播放器容器 -->
            <div class="video-container">
                <div id="player" style="width:100%;height:100%"></div>
                <div class="no-video">
                    <i class="material-icons">play_circle_outline</i>
                    <p>正在加载播放列表...</p>
                </div>
            </div>

            <!-- 视频信息区域 -->
            <div class="video-info">
                <h1 id="currentVideoTitle">加载中...</h1>
                <div class="video-controls">
                    <button id="prevVideo" class="control-button">
                        <i class="material-icons">skip_previous</i>
                    </button>
                    <button id="nextVideo" class="control-button">
                        <i class="material-icons">skip_next</i>
                    </button>
                    <button id="toggleFullscreen" class="control-button">
                        <i class="material-icons">fullscreen</i>
                    </button>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 新增 ArtPlayer 依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/artplayer@latest/dist/artplayer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-hls@latest/dist/artplayer-plugin-hls.js"></script>
    <script src="player.js"></script>
</body>
</html>
