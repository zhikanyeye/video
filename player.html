<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放器</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- ArtPlayer 核心 -->
    <script src="https://cdn.jsdelivr.net/npm/artplayer@5.0.9/dist/artplayer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-hls@2.0.0/dist/artplayer-plugin-hls.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
    <!-- 字幕支持 -->
    <script src="https://cdn.jsdelivr.net/npm/artplayer-plugin-ass@2.0.0/dist/artplayer-plugin-ass.min.js"></script>
    <link rel="stylesheet" href="player.css">
</head>
<body>
    <div class="player-container">
        <div class="main-content">
            <div class="player-header">
                <div class="header-controls">
                    <a href="index.html" class="control-button">
                        <i class="material-icons">arrow_back</i>
                        返回列表
                    </a>
                    <button class="control-button" onclick="videoPlayer.togglePlaylist()">
                        <i class="material-icons">playlist_play</i>
                        播放列表
                    </button>
                    <button id="prevVideo" class="control-button" onclick="videoPlayer.playPrevious()">
                        <i class="material-icons">skip_previous</i>
                    </button>
                    <button id="nextVideo" class="control-button" onclick="videoPlayer.playNext()">
                        <i class="material-icons">skip_next</i>
                    </button>
                    <div class="auto-fullscreen-option">
                        <input type="checkbox" id="autoFullscreen" />
                        <label for="autoFullscreen">自动全屏</label>
                    </div>
                </div>
                <h1 id="videoTitle">加载中...</h1>
            </div>
            <div id="player"></div>
        </div>

        <div class="playlist-sidebar" id="playlistSidebar">
            <div class="playlist-header">
                <h2>
                    <i class="material-icons">playlist_play</i>
                    播放列表
                </h2>
                <button class="control-button" onclick="videoPlayer.togglePlaylist()">
                    <i class="material-icons">close</i>
                </button>
            </div>
            <div class="playlist-content" id="playlistContent"></div>
        </div>
    </div>
    <script src="enhanced-player.js"></script>
</body>
</html>
