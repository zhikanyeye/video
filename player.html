<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>视频播放器</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/dplayer@1.27.1/dist/DPlayer.min.css">
    <link rel="stylesheet" href="player.css">
    
    <!-- 依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/dplayer@1.27.1/dist/DPlayer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12"></script>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2"></script>
</head>
<body class="player-page">
    <div class="player-layout">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>
                    <i class="material-icons">playlist_play</i> 
                    播放列表
                </h2>
                <button id="toggleSidebar" class="toggle-sidebar">
                    <i class="material-icons">chevron_left</i>
                </button>
            </div>
            <div class="playlist-container">
                <div class="playlist-header">
                    <span class="video-count">0 个视频</span>
                    <button class="clear-playlist" onclick="videoPlayer.clearPlaylist()">
                        <i class="material-icons">delete_sweep</i>
                    </button>
                </div>
                <div id="playerPlaylist" class="playlist-items"></div>
            </div>
        </aside>

        <!-- 主要内容区 -->
        <main class="main-content">
            <button id="showSidebar" class="show-sidebar-button">
                <i class="material-icons">menu</i>
            </button>

            <!-- 视频播放器区域 -->
            <div class="video-container">
                <div id="player"></div>
            </div>

            <!-- 视频信息区域 -->
            <div class="video-info">
                <h1 id="currentVideoTitle">等待播放...</h1>
                <div class="video-controls">
                    <button id="prevVideo" class="control-button" disabled>
                        <i class="material-icons">skip_previous</i>
                    </button>
                    <button id="nextVideo" class="control-button" disabled>
                        <i class="material-icons">skip_next</i>
                    </button>
                    <button id="toggleFullscreen" class="control-button">
                        <i class="material-icons">fullscreen</i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- 视频资源检测提示 -->
    <div id="snifferAlert" class="sniffer-alert">
        <i class="material-icons">notifications</i>
        <span id="snifferMessage"></span>
    </div>

    <!-- 加载状态指示器 -->
    <div id="loadingIndicator" class="loading-indicator">
        <div class="spinner"></div>
        <p>正在加载播放器...</p>
    </div>

    <!-- 错误提示容器 -->
    <div id="errorContainer" class="error-container" style="display:none;">
        <div class="error-message">
            <i class="material-icons">error_outline</i>
            <p id="errorText"></p>
            <button onclick="location.reload()" class="retry-button">
                <i class="material-icons">refresh</i> 重试
            </button>
        </div>
    </div>

    <script src="enhanced-player.js"></script>
    <script>
        // 初始化播放器
        document.addEventListener('DOMContentLoaded', () => {
            const loadingIndicator = document.getElementById('loadingIndicator');
            const errorContainer = document.getElementById('errorContainer');
            const errorText = document.getElementById('errorText');
            
            try {
                window.videoPlayer = new EnhancedVideoPlayer();
                loadingIndicator.style.display = 'none';
                
                // 测试播放
                videoPlayer.addVideo('测试视频', 'https://cloud.06dn.com/s/Q7LKiJ/video?name=0101.mp4');
                
            } catch (error) {
                console.error('播放器初始化失败:', error);
                loadingIndicator.style.display = 'none';
                errorText.textContent = error.message || '播放器加载失败，请检查网络连接并刷新页面';
                errorContainer.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
