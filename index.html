<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青云播 - 视频管理</title>
    
    <!-- 网站图标 -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="icon" type="image/svg+xml" sizes="16x16" href="assets/favicon-16.svg">
    <link rel="shortcut icon" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/favicon.svg">
    
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">
                    <i class="material-icons">videocam</i>
                    青云播
                </h1>
                <div class="header-actions">
                    <div id="githubUserInfo" class="github-user-info hidden">
                        <span id="githubUsername"></span>
                        <button id="logoutBtn" class="btn btn-link">
                            <i class="material-icons">logout</i>
                            退出
                        </button>
                    </div>
                    <button id="clearAllBtn" class="btn btn-danger">
                        <i class="material-icons">delete_sweep</i>
                        清空列表
                    </button>
                </div>
            </div>
        </header>

        <main class="main-content">
            <!-- 添加视频区域 -->
            <section class="add-video-section">
                <h2>
                    <i class="material-icons">add_circle</i>
                    添加视频
                </h2>
                
                <form id="addVideoForm" class="add-form">
                    <div class="form-group">
                        <label for="videoTitle">视频标题</label>
                        <input type="text" id="videoTitle" placeholder="请输入视频标题" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="videoUrl">视频链接</label>
                        <input type="url" id="videoUrl" placeholder="请输入视频链接（支持多种格式）" required>
                        <div class="url-help">
                            支持：MP4、M3U8、FLV、RTMP等格式
                        </div>
                    </div>
                    
                    <!-- 批量添加功能（折叠） -->
                    <div class="form-group bulk-group">
                        <button type="button" class="bulk-toggle" id="bulkToggleBtn" aria-expanded="false" aria-controls="bulkPanel">
                            <i class="material-icons">playlist_add</i>
                            批量添加
                            <i class="material-icons bulk-toggle-arrow">expand_more</i>
                        </button>
                        <div id="bulkPanel" class="bulk-panel" hidden>
                            <textarea
                                id="bulkText"
                                class="bulk-textarea"
                                placeholder="每行一个链接，可在链接后加空格和标题&#10;例如：&#10;https://example.com/video1.mp4 第一集&#10;https://example.com/video2.m3u8"
                                rows="4"
                                aria-label="批量添加视频链接"
                            ></textarea>
                            <div class="bulk-help">
                                <small>链接后加空格可指定标题，否则自动生成</small>
                                <button type="button" id="clearBulkTextBtn" class="btn-link">清空</button>
                            </div>
                            <div class="bulk-actions">
                                <button type="button" id="bulkAddBtn" class="btn btn-secondary">
                                    <i class="material-icons">add</i>
                                    确认批量添加
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="videoType">视频类型</label>
                        <select id="videoType">
                            <option value="auto">自动检测</option>
                            <option value="mp4">MP4</option>
                            <option value="m3u8">M3U8 (HLS)</option>
                            <option value="flv">FLV</option>
                            <option value="rtmp">RTMP</option>
                        </select>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">
                            <i class="material-icons">add</i>
                            添加到播放列表
                        </button>
                        <button type="button" id="bulkAddBtn" class="btn btn-secondary">
                            <i class="material-icons">playlist_add</i>
                            批量添加
                        </button>
                        <button type="button" id="probeCurrentBtn" class="btn btn-secondary">
                            <i class="material-icons">manage_search</i>
                            检测源
                        </button>
                    </div>
                </form>
            </section>

            <!-- 播放列表区域 -->
            <section class="playlist-section">
                <div class="section-header">
                    <h2>
                        <i class="material-icons">queue_music</i>
                        播放列表 (<span id="videoCount">0</span>)
                    </h2>
                    <div class="section-actions">
                        <button id="playAllBtn" class="btn btn-success">
                            <i class="material-icons">play_arrow</i>
                            播放全部
                        </button>
                        <button id="shareBtn" class="btn btn-primary">
                            <i class="material-icons">share</i>
                            生成分享链接
                        </button>
                        <div class="dropdown">
                            <button class="btn btn-secondary dropdown-trigger" id="moreActionsBtn" aria-haspopup="true" aria-expanded="false">
                                <i class="material-icons">more_horiz</i>
                                更多
                                <i class="material-icons dropdown-arrow">expand_more</i>
                            </button>
                            <div class="dropdown-menu" id="moreActionsMenu" role="menu">
                                <button class="dropdown-item" id="importBtn" role="menuitem">
                                    <i class="material-icons">cloud_download</i>
                                    从 GitHub 导入
                                </button>
                                <button class="dropdown-item" id="exportBtn" role="menuitem">
                                    <i class="material-icons">download</i>
                                    导出列表
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="playlist-container">
                    <div id="emptyState" class="empty-state">
                        <i class="material-icons">video_library</i>
                        <h3>暂无视频</h3>
                        <p>请添加视频到播放列表</p>
                    </div>
                    
                    <div id="videoList" class="video-list"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- 播放源检测模态框 -->
    <div id="probeModal" class="modal">
        <div class="modal-content probe-modal-content">
            <div class="modal-header">
                <h3>播放源检测</h3>
                <button id="probeModalClose" class="modal-close" aria-label="关闭检测弹窗">
                    <i class="material-icons">close</i>
                </button>
            </div>
            <div class="modal-body">
                <div id="probeResult" class="probe-result"></div>
            </div>
            <div class="modal-footer">
                <button id="probeModalDone" class="btn btn-secondary" type="button">完成</button>
            </div>
        </div>
    </div>

    <!-- 分享链接模态框 -->
    <div id="shareModal" class="modal">
        <div class="modal-content share-modal-content">
            <div class="modal-header">
                <h3>分享播放列表</h3>
                <button id="shareModalClose" class="modal-close" aria-label="关闭分享弹窗">
                    <i class="material-icons">close</i>
                </button>
            </div>
            <div class="modal-body">
                <div class="share-content">
                    <div class="share-url-section">
                        <label for="shareUrlInput">分享链接</label>
                        <div class="url-input-group">
                            <input type="text" id="shareUrlInput" readonly />
                            <button id="copyShareUrlBtn" class="btn btn-primary" type="button">
                                <i class="material-icons">content_copy</i>
                                复制链接
                            </button>
                        </div>
                        <div id="shareCopyStatus" class="share-copy-status" aria-live="polite"></div>
                    </div>
                    <div class="share-tips">
                        <h4>分享说明</h4>
                        <ul>
                            <li>链接已保存到 GitHub Gist，可在其他设备打开播放。</li>
                            <li>如果浏览器没有自动复制权限，请点击上方按钮复制。</li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="shareModalDone" class="btn btn-secondary" type="button">完成</button>
            </div>
        </div>
    </div>

    <!-- GitHub导入模态框 -->
    <div id="importModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>从GitHub导入播放列表</h3>
                <button id="importModalClose" class="modal-close">
                    <i class="material-icons">close</i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="gistUrl">Gist URL或ID</label>
                    <input type="text" id="gistUrl" placeholder="请输入Gist链接或ID" />
                    <div class="url-help">
                        支持：https://gist.github.com/user/xxxxx 或直接输入Gist ID
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="importCancel" class="btn btn-secondary">取消</button>
                <button id="importConfirm" class="btn btn-primary">导入</button>
            </div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">确认操作</h3>
                <button id="modalClose" class="modal-close">
                    <i class="material-icons">close</i>
                </button>
            </div>
            <div class="modal-body">
                <p id="modalMessage">确定要执行此操作吗？</p>
            </div>
            <div class="modal-footer">
                <button id="modalCancel" class="btn btn-secondary">取消</button>
                <button id="modalConfirm" class="btn btn-primary">确定</button>
            </div>
        </div>
    </div>

    <!-- 消息提示 -->
    <div id="toast" class="toast"></div>

    <!-- Vite 入口 -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
