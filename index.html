<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频列表管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="input-section">
            <h2>添加视频</h2>
            <div class="single-input">
                <input type="text" id="videoTitle" placeholder="视频标题">
                <input type="text" id="videoUrl" placeholder="视频链接">
                <button onclick="addVideo()">添加视频</button>
            </div>
            
            <h2>批量添加视频</h2>
            <textarea id="batchInput" placeholder="格式：每行一个视频，标题和链接用逗号分隔&#10;例如：&#10;视频1,https://example.com/video1&#10;视频2,https://example.com/video2"></textarea>
            <button onclick="addBatchVideos()">批量添加</button>
        </div>

        <div class="playlist-manager">
            <h2>当前播放列表</h2>
            <div id="playlist"></div>
            <div class="playlist-actions">
                <button onclick="generatePlayerPage()">生成播放页面</button>
                <a id="playerPageLink" href="player.html" target="_blank" style="display: none;">
                    <button>打开播放页面</button>
                </a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
