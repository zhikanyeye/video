<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频列表管理</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="panel input-section">
            <h2>
                <i class="material-icons">add_circle_outline</i>
                添加视频
            </h2>
            <div class="single-input">
                <input type="text" id="videoTitle" placeholder="视频标题">
                <input type="text" id="videoUrl" placeholder="视频链接">
                <button onclick="playlistManager.addVideo()">
                    <i class="material-icons">add</i>
                    添加视频
                </button>
            </div>
            
            <h2>
                <i class="material-icons">playlist_add</i>
                批量添加视频
            </h2>
            <textarea id="batchInput" placeholder="格式：每行一个视频，标题和链接用逗号分隔&#10;例如：&#10;视频1,https://example.com/video1&#10;视频2,https://example.com/video2"></textarea>
            <button onclick="playlistManager.addBatchVideos()">
                <i class="material-icons">playlist_add_check</i>
                批量添加
            </button>
        </div>

        <div class="panel playlist-manager">
            <div class="playlist-header">
                <h2>
                    <i class="material-icons">playlist_play</i>
                    当前播放列表
                </h2>
                <button class="danger-button" onclick="playlistManager.clearPlaylist()" id="clearPlaylistBtn" style="display: none;">
                    <i class="material-icons">delete_sweep</i>
                    清空列表
                </button>
            </div>
            <div id="playlist"></div>
            <div class="playlist-actions">
                <button onclick="playlistManager.generatePlayerPage()">
                    <i class="material-icons">play_circle_filled</i>
                    生成播放列表
                </button>
            </div>
        </div>

        <div class="panel github-section">
            <h2>
                <i class="material-icons">settings</i>
                GitHub 设置
            </h2>
            <div class="token-input">
                <input type="password" id="githubToken" placeholder="输入 GitHub Token">
                <button onclick="playlistManager.saveGitHubToken()">
                    <i class="material-icons">save</i>
                    保存 Token
                </button>
            </div>
            <p class="token-hint">
                请在 <a href="https://github.com/settings/tokens" target="_blank">GitHub Token 设置页面</a> 
                创建一个具有 gist 权限的 Token（至少需要 gist 权限）
            </p>
        </div>
    </div>
    <script src="list-manager.js"></script>
</body>
</html>
